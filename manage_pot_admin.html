<body class="bg-background text-on-background font-body-md antialiased">
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const adminKey = urlParams.get('admin_key');
  if (adminKey !== 'nairapot_admin_2024') {
    window.location.href = 'index.html';
  }
</script>
<div class="min-h-screen bg-background">
  <aside class="fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant p-md shadow-sm">
    <a href="admin_dashboard_overview.html?admin_key=nairapot_admin_2024" class="flex items-center gap-3 mb-xl">
      <img src="Nairapot.png" alt="Nairapot logo" class="h-8"/>
      <span class="font-title-md text-title-md font-bold text-primary">Nairapot Admin</span>
    </a>
    <nav class="flex flex-col gap-2">
      <a class="px-4 py-3 rounded-xl text-on-surface-variant hover:text-primary hover:bg-surface-container-high" href="admin_dashboard_overview.html?admin_key=nairapot_admin_2024">Overview</a>
      <a class="px-4 py-3 rounded-xl bg-primary text-on-primary font-semibold" href="manage_pot_admin.html?admin_key=nairapot_admin_2024">Manage Pots</a>
      <a class="px-4 py-3 rounded-xl text-on-surface-variant hover:text-primary hover:bg-surface-container-high" href="user_admin_manager.html?admin_key=nairapot_admin_2024">Users</a>
      <a class="px-4 py-3 rounded-xl text-on-surface-variant hover:text-primary hover:bg-surface-container-high" href="admin_transaction_history.html?admin_key=nairapot_admin_2024">Transactions</a>
    </nav>
  </aside>

  <main class="ml-64 pt-16 px-margin-mobile md:px-margin-desktop pb-xl">
    <header class="fixed top-0 left-64 right-0 h-16 bg-surface/95 backdrop-blur border-b border-outline-variant flex items-center justify-between px-6 z-40">
      <div class="flex items-center gap-3">
        <img src="Nairapot.png" alt="Nairapot logo" class="h-8"/>
        <div>
          <p class="text-label-sm text-on-surface-variant uppercase">Manage Pots</p>
          <h1 class="font-headline-lg text-headline-lg text-primary">Create and Review Pots</h1>
        </div>
      </div>
      <a href="index.html" class="font-label-sm text-primary hover:text-primary-container">Back to site</a>
    </header>

    <section class="pt-20">
      <div class="bg-white p-md rounded-3xl border border-[#E0EADF] shadow-sm mb-xl">
        <h2 class="font-title-md text-title-md text-primary mb-4">Launch New Pot</h2>
        <form id="createPotForm" class="grid grid-cols-1 lg:grid-cols-2 gap-md">
          <div class="space-y-sm">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="itemName">Item Name</label>
            <input id="itemName" type="text" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container focus:ring-2 focus:ring-secondary transition-all outline-none" placeholder="e.g. iPhone 15 Pro" required />
          </div>
          <div class="space-y-sm">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="ticketPrice">Ticket Price</label>
            <input id="ticketPrice" type="number" min="0" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container focus:ring-2 focus:ring-secondary transition-all outline-none" placeholder="5000" required />
          </div>
          <div class="space-y-sm">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="totalSpots">Total Spots</label>
            <input id="totalSpots" type="number" min="1" class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-surface-container focus:ring-2 focus:ring-secondary transition-all outline-none" placeholder="200" required />
          </div>
          <div class="space-y-sm">
            <label class="font-label-sm text-label-sm text-on-surface-variant" for="potImage">Pot Image</label>
            <input id="potImage" type="file" accept="image/*" class="w-full text-sm text-on-surface border border-outline-variant rounded-xl bg-surface-container focus:ring-2 focus:ring-secondary transition-all outline-none" required />
          </div>
          <div class="lg:col-span-2 text-right">
            <button id="createPotButton" type="submit" class="inline-flex items-center justify-center gap-2 bg-primary text-on-primary px-6 py-3 rounded-xl font-bold hover:bg-primary-container transition-all">Create Pot</button>
          </div>
        </form>
        <p id="formStatus" class="mt-sm text-body-md text-secondary"></p>
      </div>

      <div class="bg-white p-md rounded-3xl border border-[#E0EADF] shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-label-sm text-on-surface-variant uppercase tracking-[0.16em]">Active Pots</p>
            <h2 class="font-title-md text-title-md text-primary mt-2">Live Pot Table</h2>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-left">
            <thead class="bg-surface-container-low text-on-surface-variant text-label-sm uppercase tracking-[0.16em]">
              <tr>
                <th class="px-4 py-3">Item</th>
                <th class="px-4 py-3">Price</th>
                <th class="px-4 py-3">Spots</th>
                <th class="px-4 py-3">Filled</th>
                <th class="px-4 py-3">Image</th>
              </tr>
            </thead>
            <tbody id="potsTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  const supabaseUrl = 'https://jcqcvedbhoqobmfrscrh.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcWN2ZWRiaG9xb2JtZnJzY3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk4NjExMjksImV4cCI6MjA1NTQzNzEyOX0.7LjmH3b3bEWwLJqJEXR4nh3c1DHMpyYrBbHQs_5noQg';
  window.supabase = window.supabase || window.supabase.createClient(supabaseUrl, supabaseKey);
  var supabase = window.supabase;

  async function loadPots() {
    try {
      const { data: pots, error } = await supabase.from('pots').select('*');
      if (error) throw error;
      const tbody = document.getElementById('potsTableBody');
      tbody.innerHTML = '';
      pots.forEach(pot => {
        const row = document.createElement('tr');
        row.className = 'border-b border-surface-container-high hover:bg-surface-container-lowest transition-colors';
        row.innerHTML = `
          <td class="px-4 py-4 font-medium text-on-surface">${pot.item_name}</td>
          <td class="px-4 py-4 text-on-surface">₦${Number(pot.ticket_price || 0).toLocaleString()}</td>
          <td class="px-4 py-4 text-on-surface">${pot.total_spots}</td>
          <td class="px-4 py-4 text-on-surface">${pot.spots_filled}</td>
          <td class="px-4 py-4 text-primary hover:underline"><a href="${pot.image_url}" target="_blank">View</a></td>
        `;
        tbody.appendChild(row);
      });
    } catch (error) {
      console.error('Failed to load pots:', error);
    }
  }

  document.getElementById('createPotForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const statusEl = document.getElementById('formStatus');
    const button = document.getElementById('createPotButton');
    const itemName = document.getElementById('itemName').value.trim();
    const ticketPrice = Number(document.getElementById('ticketPrice').value);
    const totalSpots = Number(document.getElementById('totalSpots').value);
    const potImage = document.getElementById('potImage').files[0];

    if (!itemName || !ticketPrice || !totalSpots || !potImage) {
      statusEl.textContent = 'Please complete every field before launching.';
      return;
    }
    button.disabled = true;
    statusEl.textContent = 'Uploading image...';

    try {
      const fileName = `${Date.now()}_${potImage.name}`;
      const { data: uploadData, error: uploadError } = await supabase.storage
        .from('pot-images')
        .upload(fileName, potImage, { cacheControl: '3600', upsert: false });
      if (uploadError) throw uploadError;

      const { data: publicData, error: publicError } = await supabase.storage
        .from('pot-images')
        .getPublicUrl(fileName);
      if (publicError) throw publicError;
      const imageUrl = publicData?.publicUrl;
      if (!imageUrl) throw new Error('Unable to get public URL for uploaded image.');

      statusEl.textContent = 'Saving pot...';
      const { error } = await supabase.from('pots').insert([{ item_name: itemName, ticket_price: ticketPrice, total_spots: totalSpots, spots_filled: 0, image_url: imageUrl }]);
      if (error) throw error;
      statusEl.textContent = 'Pot successfully created.';
      document.getElementById('createPotForm').reset();
      loadPots();
    } catch (error) {
      statusEl.textContent = 'Unable to create pot. Check console.';
      console.error('Create pot failed:', error);
    } finally {
      button.disabled = false;
    }
  });

  function preserveAdminKeyLinks() {
    const adminKey = new URLSearchParams(window.location.search).get('admin_key');
    if (!adminKey) return;
    document.querySelectorAll('aside a').forEach((link) => {
      const href = link.getAttribute('href');
      if (!href) return;
      const url = new URL(href, window.location.origin);
      url.searchParams.set('admin_key', adminKey);
      link.setAttribute('href', `${url.pathname}${url.search}`);
    });
  }

  window.addEventListener('DOMContentLoaded', preserveAdminKeyLinks);
  window.addEventListener('DOMContentLoaded', loadPots);
</script>
