<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pot Details | Nairapot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Manrope:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background font-body-md antialiased">
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-desktop py-4 bg-surface/90 backdrop-blur-md shadow-sm border-b border-outline-variant">
  <a class="text-title-md font-title-md font-bold text-primary flex items-center gap-2" href="index.html">
    <img src="Nairapot.png" alt="Nairapot logo" class="h-8" />
    Nairapot
  </a>
  <div class="hidden md:flex items-center gap-gutter">
    <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors py-2" href="index.html#how-it-works">How it Works</a>
    <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors py-2" href="browse_pots_nairapot.html">Active Pots</a>
    <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors py-2" href="index.html#community">Community</a>
  </div>
  <div class="flex items-center gap-sm">
    <a class="hidden md:inline-flex items-center justify-center font-label-sm text-label-sm text-primary hover:bg-surface-container-low transition-all px-4 py-2 rounded-lg" href="login_to_nairapot.html">Login</a>
    <a id="header-dashboard-btn" class="hidden md:inline-flex items-center justify-center font-label-sm text-label-sm text-primary hover:bg-surface-container-low transition-all px-4 py-2 rounded-lg" href="my_dashboard_nairapot.html" style="display: none;">Dashboard</a>
    <a class="inline-flex items-center justify-center font-label-sm text-label-sm bg-primary text-on-primary px-6 py-2.5 rounded-lg hover:shadow-md transition-all active:scale-95 duration-150 ease-in-out" href="my_dashboard_nairapot.html">Join a Pot</a>
  </div>
</nav>
<main class="pt-[112px] pb-xl px-margin-mobile md:px-margin-desktop max-w-[1280px] mx-auto">
  <div id="potDetailsContainer" class="max-w-7xl mx-auto px-4 py-8"></div>
</main>
<footer class="w-full px-margin-desktop py-xl bg-primary text-on-primary text-center">
  <p class="font-body-md text-body-md text-primary-fixed-dim/80">© 2024 Nairapot. Designed to be filled from a database like Supabase.</p>
</footer>
<script>
  function formatCurrency(value) {
    return '₦' + Number(value || 0).toLocaleString('en-NG');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcWN2ZWRiaG9xb2JtZnJzY3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDg3MTgsImV4cCI6MjA5NDA4NDcxOH0.a2ciDyC-qdCfgAIXXf2Jx8aZAyAIhN2lFcK36cV9oQg';
  var supabase = window.__nairapot_supabase || window.supabase.createClient('https://jcqcvedbhoqobmfrscrh.supabase.co', supabaseKey);
  window.__nairapot_supabase = supabase;

  function updateHeaderForSession(isAuthenticated) {
    const loginButton = document.querySelector('a[href="login_to_nairapot.html"]');
    const dashboardButton = document.getElementById('header-dashboard-btn');
    if (loginButton) {
      loginButton.style.display = isAuthenticated ? 'none' : 'inline-flex';
    }
    if (dashboardButton) {
      dashboardButton.style.display = isAuthenticated ? 'inline-flex' : 'none';
    }
  }

  async function initializeHeader() {
    try {
      const {
        data: { session },
        error
      } = await supabase.auth.getSession();
      if (error) {
        console.error('Supabase session check failed:', error);
        updateHeaderForSession(false);
        return;
      }
      updateHeaderForSession(Boolean(session?.user));
    } catch (error) {
      console.error('Header session initialization failed:', error);
      updateHeaderForSession(false);
    }
  }

  async function fetchPotDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const potId = urlParams.get('id');
    const container = document.getElementById('potDetailsContainer');

    if (!container) return;
    if (!potId) {
      container.innerHTML = '<p class="text-center text-on-surface-variant">No pot ID specified.</p>';
      return;
    }

    try {
      const { data: pot, error } = await supabase.from('pots').select('*').eq('id', potId).single();
      if (error || !pot) {
        console.error('Error fetching pot details:', error);
        container.innerHTML = '<p class="text-center text-on-surface-variant">Failed to load this pot.</p>';
        return;
      }

      const progressPercent = pot.total_spots ? Math.round(((pot.spots_filled ?? 0) / pot.total_spots) * 100) : 0;
      const ticketPrice = formatCurrency(pot.ticket_price ?? 0);
      const transactionFee = formatCurrency(pot.transaction_fee ?? 150);
      const subtotal = formatCurrency((pot.spots_filled ?? 1) * (pot.ticket_price ?? 0));
      const totalCost = formatCurrency(((pot.spots_filled ?? 1) * (pot.ticket_price ?? 0)) + (pot.transaction_fee ?? 150));

      container.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg items-start">
          <section class="lg:col-span-8 space-y-lg">
            <div class="w-full aspect-square md:aspect-video max-h-[450px] flex items-center justify-center bg-gray-50 rounded-2xl overflow-hidden">
              <img src="${pot.image_url || 'https://via.placeholder.com/900x600?text=No+Image'}" class="max-w-full max-h-full object-contain mix-blend-multiply" alt="${pot.item_name || 'Pot Image'}" />
            </div>
            <div class="space-y-md">
              <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4">
                <div>
                  <span class="inline-block px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed font-label-sm text-label-sm rounded-full mb-3">${pot.category || 'General'}</span>
                  <h1 class="font-headline-lg text-headline-lg text-primary">${pot.item_name || 'Untitled Pot'}</h1>
                </div>
                <div class="text-right">
                  <p class="font-label-sm text-label-sm text-on-surface-variant">Status</p>
                  <p class="font-title-md text-title-md text-secondary font-bold">${pot.pot_status || pot.status || 'Live'}</p>
                </div>
              </div>
              <div class="bg-surface-container-high h-4 rounded-full overflow-hidden mb-base">
                <div class="h-full bg-gradient-to-r from-primary to-secondary-fixed rounded-full" style="width: ${progressPercent}%"></div>
              </div>
              <div class="flex flex-col sm:flex-row justify-between text-on-surface-variant font-label-sm text-label-sm gap-2">
                <span>${pot.spots_filled ?? 0} joined</span>
                <span>${pot.total_spots ?? 0} total</span>
                <span>${progressPercent}% filled</span>
              </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-md mb-lg">
              <div class="p-md bg-surface-container-low border border-outline-variant rounded-xl flex flex-col items-center text-center">
                <span class="font-label-sm text-label-sm text-on-surface-variant">Ticket Price</span>
                <span class="font-title-md text-title-md text-primary font-bold">${ticketPrice}</span>
              </div>
              <div class="md:col-span-3 p-md bg-surface-container-low border border-outline-variant rounded-xl flex flex-col items-center text-center">
                <span class="font-label-sm text-label-sm text-on-surface-variant">Description</span>
                <span class="font-body-md text-body-md text-on-surface-variant">${pot.description || 'No description available.'}</span>
              </div>
            </div>
          </section>
          <aside class="lg:col-span-4">
            <div class="sticky top-28 bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-lg space-y-md">
              <h2 class="font-title-md text-title-md text-primary">Join the Pot</h2>
              <div class="flex justify-between items-center p-base bg-surface-container-low rounded-lg">
                <span class="text-on-surface-variant font-label-sm text-label-sm uppercase">Unit Price</span>
                <span class="text-primary font-bold font-title-md text-title-md">${ticketPrice}</span>
              </div>
              <div class="space-y-base">
                <div class="flex justify-between text-on-surface font-label-sm text-label-sm">
                  <span>Select Spots</span>
                  <span class="text-primary">Max ${pot.total_spots ?? 0}</span>
                </div>
                <div class="flex items-center justify-between border border-outline-variant rounded-xl p-xs bg-surface">
                  <button class="w-12 h-12 flex items-center justify-center text-primary hover:bg-surface-container hover:rounded-lg transition-all active:scale-90" type="button" disabled>
                    <span class="material-symbols-outlined">remove</span>
                  </button>
                  <div class="text-center">
                    <span class="font-headline-lg text-headline-lg text-primary">1</span>
                    <span class="block font-label-sm text-label-sm text-on-surface-variant -mt-1">spots</span>
                  </div>
                  <button class="w-12 h-12 flex items-center justify-center text-primary hover:bg-surface-container hover:rounded-lg transition-all active:scale-90" type="button" disabled>
                    <span class="material-symbols-outlined">add</span>
                  </button>
                </div>
              </div>
              <div class="border-t border-outline-variant pt-md space-y-3">
                <div class="flex justify-between text-on-surface-variant font-body-md text-body-md">
                  <span>Subtotal</span>
                  <span>${subtotal}</span>
                </div>
                <div class="flex justify-between text-on-surface-variant font-body-md text-body-md">
                  <span>Transaction Fee</span>
                  <span>${transactionFee}</span>
                </div>
                <div class="flex justify-between items-center bg-secondary-container/20 p-md rounded-xl border border-secondary/20">
                  <span class="font-title-md text-title-md text-primary font-bold">Total Cost</span>
                  <span class="font-title-md text-title-md text-primary font-bold">${totalCost}</span>
                </div>
              </div>
              <a href="pot_details.html?id=${pot.id}" class="w-full inline-flex items-center justify-center py-4 bg-primary text-on-primary font-title-md text-title-md rounded-xl shadow-lg hover:bg-primary-container transition-all active:scale-95 gap-base">
                Secure Your Spots
                <span class="material-symbols-outlined">rocket_launch</span>
              </a>
            </div>
          </aside>
        </div>
      `;
    } catch (error) {
      console.error('Failed to fetch pot details:', error);
      const container = document.getElementById('potDetailsContainer');
      if (container) container.innerHTML = '<p class="text-center text-on-surface-variant">Failed to load this pot.</p>';
    }
  }

  window.addEventListener('DOMContentLoaded', async function () {
    await initializeHeader();
    await fetchPotDetails();
  });
</script>
</body>
</html>
