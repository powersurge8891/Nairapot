<script>

  <main class="ml-64 pt-16 px-margin-mobile md:px-margin-desktop pb-xl">
    <header class="fixed top-0 left-64 right-0 h-16 bg-surface/95 backdrop-blur border-b border-outline-variant flex items-center justify-between px-6 z-40">

        <div class="bg-white p-md rounded-3xl border border-[#E0EADF] shadow-sm">
          <p class="text-label-sm text-on-surface-variant uppercase tracking-[0.16em] mb-2">Total Users</p>

          <p class="text-body-md text-on-surface-variant mt-2">Profiles in Supabase</p>
        </div>
        <div class="bg-white p-md rounded-3xl border border-[#E0EADF] shadow-sm">

        </div>

          <p class="text-label-sm text-on-surface-variant uppercase tracking-[0.16em] mb-2">Recent Signups</p>
          <h2 id="recentUsers" class="font-display-lg text-display-lg text-tertiary">0</h2>

<script>
  const supabaseUrl = 'https://jcqcvedbhoqobmfrscrh.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcWN2ZWRiaG9xb2JtZnJzY3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk4NjExMjksImV4cCI6MjA1NTQzNzEyOX0.7LjmH3b3bEWwLJqJEXR4nh3c1DHMpyYrBbHQs_5noQg';
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  function preserveAdminKeyLinks() {
    const adminKey = new URLSearchParams(window.location.search).get('admin_key');
    if (!adminKey) return;
    document.querySelectorAll('aside a').forEach((link) => {
      const href = link.getAttribute('href');
      if (!href) return;
      const url = new URL(href, window.location.origin);
      url.searchParams.set('admin_key', adminKey);
      link.setAttribute('href', `${url.pathname}${url.search}`);
    });
  }

  async function loadProfiles() {
    try {
      const { data: profiles, error } = await supabase.from('profiles').select('*');
      if (error) throw error;

      const totalUsers = profiles?.length || 0;
      const verifiedUsers = (profiles || []).filter((profile) => profile.email_confirmed_at || profile.verified || profile.is_verified).length || 0;
      const oneWeekAgo = new Date();
      oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
      const recentUsers = (profiles || []).filter((profile) => {
        const createdAt = new Date(profile.created_at || profile.inserted_at || null);
        return createdAt instanceof Date && !isNaN(createdAt) && createdAt >= oneWeekAgo;
      }).length;

      document.getElementById('totalUsers').textContent = totalUsers;
      document.getElementById('verifiedUsers').textContent = verifiedUsers;
      document.getElementById('recentUsers').textContent = recentUsers;

      const tbody = document.getElementById('profilesTableBody');
      tbody.innerHTML = '';
      (profiles || []).slice(0, 20).forEach((profile) => {
        const name = profile.full_name || profile.username || profile.name || profile.email || 'User';
        const email = profile.email || 'N/A';
        const status = profile.user_role || profile.status || (profile.email_confirmed_at || profile.verified || profile.is_verified ? 'Verified' : 'Pending');
        const joined = profile.created_at || profile.inserted_at || 'Unknown';

        const joinedDate = new Date(joined);
        const joinedText = joinedDate instanceof Date && !isNaN(joinedDate) ? joinedDate.toLocaleDateString() : joined;

        const row = document.createElement('tr');
        row.className = 'border-b border-surface-container-high hover:bg-surface-container-lowest transition-colors';
        row.innerHTML = `
          <td class="px-4 py-4 font-medium text-on-surface">${name}</td>
          <td class="px-4 py-4 text-on-surface">${email}</td>
          <td class="px-4 py-4 text-on-surface">${status}</td>
          <td class="px-4 py-4 text-on-surface">${joinedText}</td>
          <td class="px-4 py-4 text-primary hover:underline"><a href="mailto:${email}">Message</a></td>
        `;
        tbody.appendChild(row);
      });
    } catch (error) {
      console.error('Failed to load profiles:', error);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    preserveAdminKeyLinks();
    loadProfiles();
  });
</script>
